<svg viewBox="0 0 820 865" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="865" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="40" y="40" font-size="24" font-weight="700" fill="#2b2b2b">Watering &amp; Feeding Schedule</text>
  <text x="40" y="62" font-size="13" fill="#666">Raised beds, Western PA (Zone 6a) · water deep at the base in the morning · feeding is a separate, lighter cadence</text>

  <!-- GOLDEN RULES -->
  <rect x="40" y="80" width="740" height="128" rx="8" fill="#eef4f8" stroke="#bcd4e2" stroke-width="1.5"/>
  <text x="55" y="102" font-size="14" font-weight="700" fill="#2f5d78">Golden rules</text>
  <text x="55" y="124" font-size="11.5" fill="#333">1.  Water at the base, early morning — dry leaves resist disease (vital for tomatoes &amp; peppers).</text>
  <text x="55" y="144" font-size="11.5" fill="#333">2.  Deep and less often beats shallow daily — except seedlings &amp; lettuce, which want steady moisture.</text>
  <text x="55" y="164" font-size="11.5" fill="#333">3.  Check first: poke a finger 2 in down and water when it is dry at that depth.</text>
  <text x="55" y="184" font-size="11.5" fill="#333">4.  Mulch with straw or shredded leaves to hold moisture so you water less often.</text>
  <text x="55" y="200" font-size="11.5" fill="#333">5.  Feed onto already-moist soil and follow the label — feeding dry roots can burn them.</text>

  <!-- FREQUENCY STRIP -->
  <rect x="40" y="220" width="740" height="56" rx="8" fill="#f3f6ec" stroke="#cdd9b8" stroke-width="1.5"/>
  <text x="55" y="242" font-size="13" font-weight="700" fill="#5f6d2e">How often (raised beds dry out faster than ground):</text>
  <text x="55" y="262" font-size="11.5" fill="#333">Mild spring/fall: ~2×/week, deep.   ·   Summer heat (80–90°F): every other day, sometimes daily for lettuce.   ·   Target ~1.5 in/week, more in heat.</text>

  <!-- ================= PER-CROP TABLE ================= -->
  <!-- header -->
  <rect x="40" y="294" width="740" height="28" fill="#6b4f3a"/>
  <text x="50" y="313" font-size="12.5" font-weight="700" fill="#fff">Crop</text>
  <text x="160" y="313" font-size="12.5" font-weight="700" fill="#fff">Watering</text>
  <text x="415" y="313" font-size="12.5" font-weight="700" fill="#fff">Fertilizer (e.g. Miracle-Gro)</text>
  <text x="640" y="313" font-size="12.5" font-weight="700" fill="#fff">Just water / stop</text>

  <!-- column separators -->
  <g stroke="#e0d8c8" stroke-width="1">
    <line x1="150" y1="322" x2="150" y2="650"/>
    <line x1="405" y1="322" x2="405" y2="650"/>
    <line x1="630" y1="322" x2="630" y2="650"/>
  </g>

  <!-- TOMATO row -->
  <rect x="40" y="322" width="740" height="60" fill="#faf7f1"/>
  <circle cx="60" cy="352" r="9" fill="#6a994e"/><circle cx="60" cy="352" r="3.5" fill="#d1495b"/>
  <text x="74" y="356" font-size="12" font-weight="600" fill="#333">Tomato</text>
  <text x="160" y="340" font-size="11" fill="#333">Deep, even moisture ~1.5–2 in/wk;</text>
  <text x="160" y="356" font-size="11" fill="#333">daily in heat. Uneven watering causes</text>
  <text x="160" y="372" font-size="11" fill="#333">blossom-end rot &amp; cracking.</text>
  <text x="415" y="340" font-size="11" fill="#333">Every 2 wks once flowering.</text>
  <text x="415" y="356" font-size="11" fill="#333">Tomato/bloom formula (low N) —</text>
  <text x="415" y="372" font-size="11" fill="#333">too much N = leaves, few fruit.</text>
  <text x="640" y="348" font-size="11" fill="#333">Just water the first</text>
  <text x="640" y="364" font-size="11" fill="#333">~2 wks after planting.</text>

  <!-- PEPPER row -->
  <rect x="40" y="382" width="740" height="60" fill="#ffffff"/>
  <circle cx="60" cy="412" r="8" fill="#5a8f3a"/><circle cx="60" cy="412" r="3" fill="#e09f3e"/>
  <text x="74" y="416" font-size="12" font-weight="600" fill="#333">Pepper</text>
  <text x="160" y="400" font-size="11" fill="#333">Consistent ~1–1.5 in/wk. Do not let</text>
  <text x="160" y="416" font-size="11" fill="#333">it dry out during flowering &amp;</text>
  <text x="160" y="432" font-size="11" fill="#333">fruit set.</text>
  <text x="415" y="400" font-size="11" fill="#333">Every 2 wks once flowering.</text>
  <text x="415" y="416" font-size="11" fill="#333">Balanced/bloom formula; go</text>
  <text x="415" y="432" font-size="11" fill="#333">light on nitrogen.</text>
  <text x="640" y="408" font-size="11" fill="#333">Just water the first</text>
  <text x="640" y="424" font-size="11" fill="#333">1–2 wks after planting.</text>

  <!-- ONION row -->
  <rect x="40" y="442" width="740" height="60" fill="#faf7f1"/>
  <circle cx="60" cy="472" r="6" fill="#9b6dc4"/>
  <text x="74" y="476" font-size="12" font-weight="600" fill="#333">Onion</text>
  <text x="160" y="466" font-size="11" fill="#333">Even moisture ~1 in/wk —</text>
  <text x="160" y="482" font-size="11" fill="#333">shallow roots dry fast.</text>
  <text x="415" y="460" font-size="11" fill="#333">Nitrogen feed every 2–3 wks</text>
  <text x="415" y="476" font-size="11" fill="#333">during leaf growth (more</text>
  <text x="415" y="492" font-size="11" fill="#333">leaves = bigger bulbs).</text>
  <text x="640" y="460" font-size="11" font-weight="600" fill="#b5651d">STOP feeding at bulbing;</text>
  <text x="640" y="476" font-size="11" fill="#333">stop water when tops</text>
  <text x="640" y="492" font-size="11" fill="#333">flop — let them cure.</text>

  <!-- LETTUCE row -->
  <rect x="40" y="502" width="740" height="60" fill="#ffffff"/>
  <circle cx="60" cy="532" r="8" fill="#88c057"/><circle cx="60" cy="532" r="3" fill="#5a8f3a"/>
  <text x="74" y="536" font-size="12" font-weight="600" fill="#333">Lettuce</text>
  <text x="160" y="520" font-size="11" fill="#333">Little &amp; often — keep top inch</text>
  <text x="160" y="536" font-size="11" fill="#333">always moist. Near-daily in heat</text>
  <text x="160" y="552" font-size="11" fill="#333">or it bolts and turns bitter.</text>
  <text x="415" y="520" font-size="11" fill="#333">Light balanced feed every 2–3</text>
  <text x="415" y="536" font-size="11" fill="#333">wks if growth is slow; mostly</text>
  <text x="415" y="552" font-size="11" fill="#333">just water in rich soil.</text>
  <text x="640" y="528" font-size="11" fill="#333">Harvest before</text>
  <text x="640" y="544" font-size="11" fill="#333">summer heat bolts it.</text>

  <!-- BASIL row -->
  <rect x="40" y="562" width="740" height="46" fill="#faf7f1"/>
  <circle cx="60" cy="585" r="6" fill="#2e5e2e"/>
  <text x="74" y="589" font-size="12" font-weight="600" fill="#333">Basil</text>
  <text x="160" y="580" font-size="11" fill="#333">Water when the top inch is dry;</text>
  <text x="160" y="596" font-size="11" fill="#333">keep evenly moist.</text>
  <text x="415" y="580" font-size="11" fill="#333">Light every 3–4 wks or skip —</text>
  <text x="415" y="596" font-size="11" fill="#333">heavy feeding dulls flavor.</text>
  <text x="640" y="580" font-size="11" fill="#333">Pinch off flowers to</text>
  <text x="640" y="596" font-size="11" fill="#333">keep leaves coming.</text>

  <!-- MARIGOLD row -->
  <rect x="40" y="608" width="740" height="42" fill="#ffffff"/>
  <circle cx="60" cy="629" r="6" fill="#f6a72a"/>
  <text x="74" y="633" font-size="12" font-weight="600" fill="#333">Marigold</text>
  <text x="160" y="624" font-size="11" fill="#333">Drought-tolerant — water only</text>
  <text x="160" y="640" font-size="11" fill="#333">when the soil is dry.</text>
  <text x="415" y="632" font-size="11" fill="#333">None needed in decent soil.</text>
  <text x="640" y="624" font-size="11" fill="#333">Too much feed =</text>
  <text x="640" y="640" font-size="11" fill="#333">leaves, fewer blooms.</text>

  <!-- table outline -->
  <rect x="40" y="294" width="740" height="356" rx="4" fill="none" stroke="#6b4f3a" stroke-width="1.5"/>

  <!-- ================= SEASON TIMELINE ================= -->
  <text x="40" y="686" font-size="14" font-weight="700" fill="#444">Season at a glance (Zone 6a)</text>

  <!-- month axis -->
  <line x1="120" y1="702" x2="778" y2="702" stroke="#999" stroke-width="1"/>
  <g stroke="#e3e3e3" stroke-width="1">
    <line x1="120" y1="702" x2="120" y2="812"/><line x1="214" y1="702" x2="214" y2="812"/><line x1="308" y1="702" x2="308" y2="812"/><line x1="402" y1="702" x2="402" y2="812"/><line x1="496" y1="702" x2="496" y2="812"/><line x1="590" y1="702" x2="590" y2="812"/><line x1="684" y1="702" x2="684" y2="812"/><line x1="778" y1="702" x2="778" y2="812"/>
  </g>
  <g font-size="11" fill="#666" text-anchor="middle">
    <text x="167" y="716">APR</text><text x="261" y="716">MAY</text><text x="355" y="716">JUN</text><text x="449" y="716">JUL</text><text x="543" y="716">AUG</text><text x="637" y="716">SEP</text><text x="731" y="716">OCT</text>
  </g>

  <!-- lanes -->
  <g font-size="11" fill="#444">
    <text x="44" y="735">Onions</text>
    <rect x="120" y="726" width="47" height="13" rx="3" fill="#4a90c2"/>
    <rect x="167" y="726" width="235" height="13" rx="3" fill="#6a994e"/>
    <rect x="402" y="726" width="138" height="13" rx="3" fill="#d98e2b"/>

    <text x="44" y="759">Lettuce</text>
    <rect x="120" y="750" width="47" height="13" rx="3" fill="#4a90c2"/>
    <rect x="167" y="750" width="517" height="13" rx="3" fill="#88c057"/>

    <text x="44" y="783">Tomatoes</text>
    <rect x="190" y="774" width="70" height="13" rx="3" fill="#4a90c2"/>
    <rect x="260" y="774" width="370" height="13" rx="3" fill="#6a994e"/>

    <text x="44" y="807">Peppers</text>
    <rect x="308" y="798" width="57" height="13" rx="3" fill="#4a90c2"/>
    <rect x="365" y="798" width="265" height="13" rx="3" fill="#6a994e"/>
  </g>

  <!-- timeline legend -->
  <g font-size="11" fill="#444">
    <rect x="120" y="828" width="14" height="11" rx="2" fill="#4a90c2"/><text x="139" y="838">Just water (establish)</text>
    <rect x="288" y="828" width="14" height="11" rx="2" fill="#6a994e"/><text x="307" y="838">Water + feed every ~2 wks</text>
    <rect x="490" y="828" width="14" height="11" rx="2" fill="#d98e2b"/><text x="509" y="838">Stop feeding / cure (onions)</text>
  </g>
</svg>
